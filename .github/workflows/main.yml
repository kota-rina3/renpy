name: Ren'Py CI

on:
  push:
    branches:
      - master
      - fix
      - feature/*
      - fix/*
      - release/*

jobs:
  build:
    name: 编译构建
    runs-on: ubuntu-latest
    container: ubuntu:25.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: 安装系统依赖
      run: |
        sudo apt update
        sudo apt install -y \
          python3-dev \
          libassimp-dev \
          libavcodec-dev \
          libavformat-dev \
          libswresample-dev \
          libswscale-dev \
          libharfbuzz-dev \
          libfreetype6-dev \
          libfribidi-dev \
          libsdl3-dev \
          libsdl3-image-dev \
          libsdl3-mixer-dev \
          libsdl3-ttf-dev \
          libjpeg-dev \
          pkg-config

    - name: 安装 Python 依赖
      run: |
        pip config set global.index-url https://mirrors.aliyun.com/pypi/simple
        pip install setuptools cython future six typing pefile requests uv assimp legacy-cgi
        uv sync

    - name: 编译 Cython/C 扩展模块
      run: ./run.sh --build

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: renpy-build
        path: ./
