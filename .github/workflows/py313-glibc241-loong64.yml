name: Ren'Py-py3_13-glibc2_41-loong64

on:
  workflow_dispatch:

jobs:
  build:
    name: 编译构建
    runs-on: ubuntu-latest
    steps:
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 在龙芯容器中编译
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/loong64/debian:trixie
          options: --platform linux/loong64
          run: |
            apt update
            apt install -y \
              python3-dev python3-pip\
              libassimp-dev libavcodec-dev libavformat-dev \
              libswresample-dev libswscale-dev libharfbuzz-dev \
              libfreetype6-dev libfribidi-dev libssl-dev \
              libsdl3-dev libsdl3-image-dev libsdl3-ttf-dev \
              libjpeg-dev pkg-config wget curl

            # 设置国内 PyPI 镜像加速
            pip3 config set global.index-url https://mirrors.loong64.com/pypi/simple

            # 安装 Python 构建依赖
            pip3 install setuptools cython future six typing uv pefile requests assimp legacy-cgi --break-system-packages

            uv sync

            # 执行 Ren'Py 编译
            ./run.sh --build

      # 4. 上传构建产物（假设构建产物在项目根目录下的某个文件夹，请根据实际情况调整）
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: renpy-py3_13-glibc2_41-loong64
          path: ./
