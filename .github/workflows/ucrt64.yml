name: Ren'Py MSYS2 UCRT64 编译

on:
  workflow_dispatch:

jobs:
  build:
    name: UCRT64 编译构建
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 MSYS2 UCRT64 环境
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-cython
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-sdl3-image
            mingw-w64-ucrt-x86_64-sdl3-ttf
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-harfbuzz
            mingw-w64-ucrt-x86_64-fribidi
            mingw-w64-ucrt-x86_64-assimp

      # 显式执行 pacman -Syu 刷新所有仓库（含 ucrt64）的包数据库
      - name: 更新 MSYS2 软件源
        shell: msys2 {0}
        run: |
          pacman -Syu --noconfirm

      # 不用 uv（Rust/maturin 在 MSYS2 上无法编译），手动建 venv + pip 安装
      - name: 安装 Python 模块
        shell: msys2 {0}
        run: |
          set -e
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install --ignore-requires-python \
            future six pefile requests rsa \
            setuptools cython jinja2 \
            "legacy-cgi" "pkgconfig>=1.6.0" \
            "chardet>=7.4.3" "websockets>=16.1" \
            "pysocks>=1.7.1" \
            assimp

      - name: 编译 Ren'Py C 扩展模块
        shell: msys2 {0}
        run: |
          set -e
          ./run.sh --build

      - name: 收集构建产物
        shell: msys2 {0}
        run: |
          set -e
          mkdir -p ./ayasaki
          cp -R renpy renpy.py ./ayasaki/
          # Windows/MinGW 编译产物后缀为 .pyd
          cp -n *.pyd ./ayasaki/ 2>/dev/null || true
          cp -n *.dll ./ayasaki/ 2>/dev/null || true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ucrt64-windows
          path: ./ayasaki/
