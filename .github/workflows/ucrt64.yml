name: Ren'Py MSYS2 UCRT64 编译

on:
  workflow_dispatch:

jobs:
  build:
    name: UCRT64 编译构建
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # Python 3.12 用 Windows 原生版本，MSYS2 UCRT64 当前只有 3.14，与 Ren'Py 不兼容
      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # MSYS2 只提供编译工具链和 C 库，不装 MSYS2 的 Python
      - name: 配置 MSYS2 UCRT64 工具链
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-sdl3-image
            mingw-w64-ucrt-x86_64-sdl3-ttf
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-harfbuzz
            mingw-w64-ucrt-x86_64-fribidi
            mingw-w64-ucrt-x86_64-assimp

      # 确保 Windows Python 3.12 优先于 MSYS2 自带的任何 Python
      - name: 安装 Python 依赖
        shell: msys2 {0}
        run: |
          set -e

          # 将 Windows Python 3.12 放在 PATH 最前面
          WINDOWS_PYTHON_DIR="$(cygpath -u "$pythonLocation")"
          export PATH="$WINDOWS_PYTHON_DIR:$WINDOWS_PYTHON_DIR/Scripts:$PATH"

          python --version
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install \
            future six pefile requests rsa \
            setuptools cython jinja2 \
            "legacy-cgi" "pkgconfig>=1.6.0" \
            "chardet>=7.4.3" "websockets>=16.1" \
            "pysocks>=1.7.1" \
            assimp

      - name: 编译 Ren'Py C 扩展模块
        shell: msys2 {0}
        run: |
          set -e

          # 确保 Windows Python 优先
          WINDOWS_PYTHON_DIR="$(cygpath -u "$pythonLocation")"
          export PATH="$WINDOWS_PYTHON_DIR:$WINDOWS_PYTHON_DIR/Scripts:$PATH"

          # 指定使用 MinGW gcc
          export CC=gcc
          export CXX=g++
          export LD=ld

          ./run.sh --build

      - name: 收集构建产物
        shell: msys2 {0}
        run: |
          set -e
          mkdir -p ./ayasaki
          cp -R renpy renpy.py ./ayasaki/
          cp -n *.pyd ./ayasaki/ 2>/dev/null || true
          cp -n *.dll ./ayasaki/ 2>/dev/null || true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ucrt64-windows
          path: ./ayasaki/
